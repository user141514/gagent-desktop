name: capture_experience
layer_owner: Layer 1 capability contract
purpose: Capture a verified, durable lesson as an agent memory candidate. Use after a fix or investigation proves a reusable fact, preference, workflow pitfall, or environment-specific path such as a successful fallback. Do not use for raw logs, guesses, temporary state, or ordinary summaries. The tool writes a preview by default and only appends to durable memory when GA_OPENAI_DISTILLATION=write.
does:
  - expose the capture_experience capability through the classic tool runtime
  - return structured output or a clear error through its handler
does_not_do:
  - own unrelated tool behavior
  - bypass path, memory, or runtime safety checks
inputs:
  - summary: required parameter
  - task: optional parameter
  - source: optional parameter
  - questions: optional parameter
  - files_touched: optional parameter
outputs:
  - structured tool result
success_contract: Completes the declared capture_experience capability and returns structured result data.
failure_contract: Returns a structured error or user-facing blocker without silently switching capability class.
fallback_policy:
  - do not change capability class silently
  - report blockers when required inputs, paths, or permissions are missing
forbidden_behaviors:
  - mutating unrelated files or state
  - acting as source of truth for another tool
smoke_tests:
  - python backend/tool_registry/validate_tool_registry.py
source_files:
  - backend/core/ga.py:GenericAgentHandler.do_capture_experience
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
