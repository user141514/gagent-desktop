name: update_working_checkpoint
layer_owner: Layer 1 capability contract
purpose: Update the short-term working checkpoint that is auto-injected on later turns. Use it to preserve critical constraints, discovered paths, validated findings, failure causes, and the next step during long or failure-prone tasks. Best moments: after reading SOP or memory, before context switches, after repeated failures, or when the user changes task scope. Skip it for simple 1-2 step tasks and for already-finished tasks.
does:
  - expose the update_working_checkpoint capability through the classic tool runtime
  - return structured output or a clear error through its handler
does_not_do:
  - own unrelated tool behavior
  - bypass path, memory, or runtime safety checks
inputs:
  - key_info: optional parameter
  - related_sop: optional parameter
outputs:
  - structured tool result
success_contract: Completes the declared update_working_checkpoint capability and returns structured result data.
failure_contract: Returns a structured error or user-facing blocker without silently switching capability class.
fallback_policy:
  - do not change capability class silently
  - report blockers when required inputs, paths, or permissions are missing
forbidden_behaviors:
  - mutating unrelated files or state
  - acting as source of truth for another tool
smoke_tests:
  - python backend/tool_registry/validate_tool_registry.py
source_files:
  - backend/core/ga.py:GenericAgentHandler.do_update_working_checkpoint
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
