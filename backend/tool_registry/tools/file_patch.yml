name: file_patch
layer_owner: Layer 1 capability contract
purpose: Perform a surgical in-place edit by replacing one unique old_content block with new_content. Best for targeted fixes after file_read. Exact match is required, including whitespace and indentation; if matching fails, re-read the file and patch a narrower, fresher block instead of guessing. Prefer this over file_write for most normal code edits.
does:
  - expose the file_patch capability through the classic tool runtime
  - return structured output or a clear error through its handler
does_not_do:
  - own unrelated tool behavior
  - bypass path, memory, or runtime safety checks
inputs:
  - path: optional parameter
  - old_content: optional parameter
  - new_content: optional parameter
outputs:
  - structured tool result
success_contract: Completes the declared file_patch capability and returns structured result data.
failure_contract: Returns a structured error or user-facing blocker without silently switching capability class.
fallback_policy:
  - do not change capability class silently
  - report blockers when required inputs, paths, or permissions are missing
forbidden_behaviors:
  - mutating unrelated files or state
  - acting as source of truth for another tool
smoke_tests:
  - python backend/tool_registry/validate_tool_registry.py
source_files:
  - backend/core/ga.py:GenericAgentHandler.do_file_patch
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
