name: file_write
layer_owner: Layer 1 capability contract
purpose: Create, overwrite, append, or prepend file contents. Use only for full-file rewrites, large generated files, or bulk content updates that are awkward for file_patch. Do NOT use it for small edits. Place the exact payload inside <file_content>...</file_content> in the reply body BEFORE the file_write call. Supports {{file:path:startLine:endLine}} references, auto-expanded before writing.
does:
  - expose the file_write capability through the classic tool runtime
  - return structured output or a clear error through its handler
does_not_do:
  - own unrelated tool behavior
  - bypass path, memory, or runtime safety checks
inputs:
  - path: optional parameter
  - mode: optional parameter
  - content: optional parameter
outputs:
  - structured tool result
success_contract: Completes the declared file_write capability and returns structured result data.
failure_contract: Returns a structured error or user-facing blocker without silently switching capability class.
fallback_policy:
  - do not change capability class silently
  - report blockers when required inputs, paths, or permissions are missing
forbidden_behaviors:
  - mutating unrelated files or state
  - acting as source of truth for another tool
smoke_tests:
  - python backend/tool_registry/validate_tool_registry.py
source_files:
  - backend/core/ga.py:GenericAgentHandler.do_file_write
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
