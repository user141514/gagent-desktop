name: web_scan
owner_layer: Layer 1 capability contract
capability_class: rendered_page_inspection
summary: Inspect the current rendered browser tab/page state and tab metadata.
implementation:
  - backend/core/ga.py:web_scan
handler:
  - backend/core/ga.py:ClassicToolHandler.do_web_scan
schema:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
sop:
  - backend/memory/web_search_tool_sop.md
  - backend/memory/tmwebdriver_sop.md
prompt_summary:
  - backend/assets/sys_prompt.txt
  - backend/assets/sys_prompt_en.txt
parameters:
  - tabs_only
  - switch_tab_id
  - text_only
required: []
returns:
  - status
  - metadata
  - content
does_not:
  - perform web search
  - execute arbitrary page JavaScript
  - own browser fallback policy
fallback_policy:
  - treat failure as browser bridge or session state
  - use web_search only when the task is actually search-like
  - use browser_agent only for complex rendered workflows
