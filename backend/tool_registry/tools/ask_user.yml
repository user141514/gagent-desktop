name: ask_user
layer_owner: Layer 1 capability contract
purpose: Interrupt the task to ask the user for a decision, missing credential, permission, clarification that cannot be inferred, or confirmation before an irreversible action. Do not use this for facts you can verify with tools. Keep the question concrete and scoped to the blocker.
does:
  - expose the ask_user capability through the classic tool runtime
  - return structured output or a clear error through its handler
does_not_do:
  - own unrelated tool behavior
  - bypass path, memory, or runtime safety checks
inputs:
  - question: optional parameter
  - candidates: optional parameter
outputs:
  - structured tool result
success_contract: Completes the declared ask_user capability and returns structured result data.
failure_contract: Returns a structured error or user-facing blocker without silently switching capability class.
fallback_policy:
  - do not change capability class silently
  - report blockers when required inputs, paths, or permissions are missing
forbidden_behaviors:
  - mutating unrelated files or state
  - acting as source of truth for another tool
smoke_tests:
  - python backend/tool_registry/validate_tool_registry.py
source_files:
  - backend/core/ga.py:GenericAgentHandler.do_ask_user
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
