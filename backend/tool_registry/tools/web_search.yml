name: web_search
layer_owner: Layer 1 capability contract
purpose: Deterministic HTTP/source discovery. Does not open, inspect, or depend on the current browser tab.
default_engine: bing
preferred_windows_transport: powershell
does:
  - run HTTP search against configured source engines
  - try GitHub API first for auto queries that explicitly mention GitHub
  - return source candidates with title, url, snippet, rank, and metadata
  - try same-capability HTTP fallback engines when ordinary search fails
  - use PowerShell Invoke-WebRequest before Python requests on Windows
does_not_do:
  - open a browser window
  - inspect current rendered tab state
  - execute JavaScript
  - use Baidu as a search backend
  - delegate ordinary search failure to web_scan
inputs:
  - query: required search string
  - engine: auto, bing, google, duckduckgo, github, or scholar
  - max_results: optional result limit
  - timeout: optional HTTP timeout
outputs:
  - status
  - query
  - engine
  - search_url
  - transport
  - result_count
  - results
  - attempts
  - error_category
  - recovery_action
  - recommended_next_tool
success_contract: Returns status=success with at least one non-search-engine source URL for general web queries.
failure_contract: Returns status=error with msg and optional attempts; network/search-backend failures remain structured failures and must stay inside the web_search capability class.
fallback_policy:
  - for auto queries that mention GitHub, try GitHub API before generic HTTP engines
  - try configured HTTP engines in order
  - keep GitHub API failure within HTTP search paths first
  - never switch to web_scan for ordinary search failure
  - never switch to browser_agent for ordinary search failure
  - report network/proxy blockers instead of changing capability class
forbidden_behaviors:
  - Baidu search backend or Baidu homepage success result
  - opening a browser window
  - reading the current browser tab
  - returning a search engine homepage as a successful source result
  - fallback from ordinary web_search failure to web_scan
smoke_tests:
  - python backend/tool_registry/tests/smoke_web_tools.py
  - web_search OpenAI API docs returns no baidu.com success URL
  - web_search yobot GitHub code returns structured failure if network unavailable
source_files:
  - backend/core/ga.py:web_search
  - backend/core/runtime/web_tool_errors.py
generated_artifacts:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
  - backend/memory/web_search_tool_sop.md
