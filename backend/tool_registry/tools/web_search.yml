name: web_search
owner_layer: Layer 1 capability contract
capability_class: http_source_discovery
summary: Deterministic HTTP/source discovery. Does not inspect or depend on the current browser tab.
default_engine: bing
implementation:
  - backend/core/ga.py:web_search
handler:
  - backend/core/ga.py:ClassicToolHandler.do_web_search
schema:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
sop:
  - backend/memory/web_search_tool_sop.md
prompt_summary:
  - backend/assets/sys_prompt.txt
  - backend/assets/sys_prompt_en.txt
parameters:
  - query
  - engine
  - max_results
  - timeout
required:
  - query
returns:
  - status
  - query
  - engine
  - search_url
  - result_count
  - results
does_not:
  - open a browser window by default
  - inspect current rendered tab state
  - use Baidu as a search backend
fallback_policy:
  - try configured HTTP engines in order
  - keep GitHub API failure within HTTP search paths first
  - do not switch to web_scan for ordinary search failure
