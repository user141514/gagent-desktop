name: web_execute_js
owner_layer: Layer 1 capability contract
capability_class: current_tab_javascript
summary: Execute precise JavaScript in the current browser tab for known DOM/page actions.
implementation:
  - backend/core/ga.py:web_execute_js
handler:
  - backend/core/ga.py:ClassicToolHandler.do_web_execute_js
schema:
  - backend/assets/tools_schema.json
  - backend/assets/tools_schema_cn.json
sop:
  - backend/memory/web_search_tool_sop.md
  - backend/memory/tmwebdriver_sop.md
prompt_summary:
  - backend/assets/sys_prompt.txt
  - backend/assets/sys_prompt_en.txt
parameters:
  - script
  - save_to_file
  - no_monitor
  - switch_tab_id
required: []
returns:
  - status
  - js_return
  - navigated
  - new_url
does_not:
  - perform general web search
  - choose selectors without page context
  - replace browser_agent for multi-step autonomous workflows
fallback_policy:
  - inspect web_scan state before broad DOM actions
  - treat bridge/session errors as browser setup problems
  - use browser_agent only when repeated rendered reasoning is needed
